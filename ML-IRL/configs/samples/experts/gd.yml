seed: 2026
cuda: 0
experiment_tag: ant_ML
env:
  env_name: CustomAnt-v0
  T: 500
  state_indices: all
sac:
  epochs: 1000
  n_timesteps: 1e6
  log_step_interval: 5000
  update_every: 1
  update_num: 1
  random_explore_episodes: 10
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
  learning_rate: 3e-4
  lr: 3e-4
  batch_size: 256
  learning_starts: 10000
  train_freq: 1
  gradient_steps: 1
  tau: 0.005
  gamma: 0.99
  ent_coef: auto
  target_update_interval: 1
  target_entropy: auto
  use_sde: false
  use_sde_at_warmup: false
  alpha: 0.2
  automatic_alpha_tuning: true
  buffer_size: 1000000
  num_test_episodes: 10
expert:
  samples_episode: 25
disc: #airl or gail
  reinit: false
  model_type: resnet_disc
  num_layer_blocks: 6
  hid_dim: 128
  hid_act: tanh
  use_bn: false
  clamp_magnitude: 10.0
  batch_size: 800
  lr: 0.0003
  weight_decay: 0.0001
  momentum: 0.9
  iter: 1200
reward: # from irl model
  use_bn: false
  residual: false
  hid_act: relu
  hidden_sizes: [128, 128]
  clamp_magnitude: 10
  path: fkl_t1_300.pkl # demo