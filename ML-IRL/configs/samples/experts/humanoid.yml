seed: 2026
cuda: 0
env:
  env_name: Humanoid-v4
  T: 1000
  state_indices: all
sac:
  epochs: 2000
  n_timesteps: 2e6
  log_step_interval: 5000
  update_every: 1
  update_num: 1
  random_explore_episodes: 10
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
  learning_rate: 3e-4
  lr: 3e-4
  batch_size: 256
  learning_starts: 10000
  train_freq: 1
  gradient_steps: 1
  tau: 0.005
  gamma: 0.99
  ent_coef: auto
  target_update_interval: 1
  target_entropy: auto
  use_sde: false
  use_sde_at_warmup: false
  alpha: 0.2
  automatic_alpha_tuning: true
  buffer_size: 1000000
  num_test_episodes: 10
expert:
  samples_episode: 25
