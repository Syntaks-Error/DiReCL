obj: maxentirl
IS: false
seed: 2026
cuda: 0
env:
  env_name: DisabledAnt-v0
  T: 500
  state_indices: all
irl:
  training_trajs: 10
  n_itrs: 500
  save_interval: 10
  eval_episodes: 20
  expert_episodes: 1
  resample_episodes: 1
sac:
  k: 1
  epochs: 1000
  n_timesteps: 1e6
  log_step_interval: 5000
  update_every: 1
  random_explore_episodes: 1
  update_num: 1
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
  learning_rate: 3e-4
  lr: 3e-4
  batch_size: 256
  learning_starts: 10000
  train_freq: 1
  gradient_steps: 1
  tau: 0.005
  gamma: 0.99
  ent_coef: auto
  target_update_interval: 1
  target_entropy: auto
  use_sde: false
  use_sde_at_warmup: false
  alpha: 0.2
  automatic_alpha_tuning: true
  buffer_size: 1000000
  num_test_episodes: 10
  reinitialize: false
bc:
  epochs: 10000
  eval_freq: 100
  eval_episodes: 20
  expert_episodes: 10
reward:
  use_bn: false
  residual: false
  hid_act: relu
  hidden_sizes: [128, 128]
  clamp_magnitude: 10
  lr: 0.0001
  weight_decay: 1e-3
  gradient_step: 1
  momentum: 0.9
disc:
  reinit: false
  model_type: resnet_disc
  num_layer_blocks: 6
  hid_dim: 128
  hid_act: tanh
  use_bn: false
  clamp_magnitude: 10.0
  batch_size: 800
  lr: 0.0003
  weight_decay: 0.0001
  momentum: 0.9
  iter: 1200
critic:
  lam: 0.5
  model_type: resnet_disc
  num_layer_blocks: 3
  hid_dim: 128
  hid_act: tanh
  use_bn: false
  batch_size: 800
  lr: 0.0003
  weight_decay: 0.0001
  momentum: 0.0
  iter: 1200
adv_irl: # https://github.com/KamyarGh/rl_swiss/blob/master/exp_specs/adv_irl.yaml
  num_epochs: 200
  num_steps_per_epoch: 100000
  num_steps_between_train_calls: 1000
  min_steps_before_training: 5000
  num_update_loops_per_train_call: 100
  num_disc_updates_per_loop_iter: 1
  num_policy_updates_per_loop_iter: 1
  disc_optim_batch_size: 256
  disc_lr: 0.0003
  disc_momentum: 0.0
  use_grad_pen: true
  grad_pen_weight: 8.0 # [2.0, 4.0, 8.0, 16.0]
  reward_scale: 16.0 # [2.0, 4.0, 8.0, 16.0]
  save_interval: 0
  eval_interval: 200
  replay_buffer_size: 20000
  disc:
    model_type: resnet_disc
    num_layer_blocks: 2
    hid_dim: 256
    hid_act: tanh
    use_bn: false
    clamp_magnitude: 10.0
